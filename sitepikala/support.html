<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pikala - Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="user-space.css">
  <script src="user-space.js" defer></script>
</head>
<body data-user-page="support">
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="index.html"><img src="logo.jpeg" alt="Pikala">Pikala</a>
      <nav class="nav"><a href="dashboard.html">Tableau de bord</a><a href="stations.html">Stations</a><a href="scanner.html">Scanner</a><a href="profil.html">Profil</a><a class="active" href="support.html">Support</a></nav>
    </aside>
    <main class="content">
      <div class="topbar"><div><p class="eyebrow">Support</p><h1>Signalez un problème.</h1></div><a class="button ghost" href="dashboard.html">Retour</a></div>
      <section class="grid two">
        <form class="panel form" data-support-form>
          <h2>Nouveau signalement</h2>
          <input name="subject" type="text" placeholder="Numéro du vélo ou station">
          <textarea name="message" placeholder="Décrivez le problème" required></textarea>
          <button class="button primary" type="submit">Envoyer le signalement</button>
        </form>
        <article class="panel">
          <h2>Aide rapide</h2>
          <div class="support-list">
            <a href="scanner.html">Je n'arrive pas à scanner</a>
            <a href="stations.html">Trouver une autre station</a>
            <a href="profil.html">Vérifier mon abonnement</a>
          </div>
        </article>
      </section>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Navigation rapide utilisateur">
    <a href="dashboard.html" data-bottom-nav="dashboard"><span aria-hidden="true">🏠</span><em>Accueil</em></a>
    <a href="stations.html" data-bottom-nav="stations"><span aria-hidden="true">📍</span><em>Stations</em></a>
    <a href="scanner.html" data-bottom-nav="scanner"><span aria-hidden="true">🔳</span><em>Scanner</em></a>
    <a href="profil.html" data-bottom-nav="profile"><span aria-hidden="true">⚙️</span><em>Profil</em></a>
    <a href="support.html" data-bottom-nav="support"><span aria-hidden="true">💬</span><em>Support</em></a>
  </nav>
</body>
</html>
