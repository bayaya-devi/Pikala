<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3; url=index.html">
<title>Pikala</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --green: #72c31a;
  --green-dark: #3f7f10;
  --paper: #fbfbf7;
  --white: #ffffff;
  --shadow: 0 24px 80px rgba(28, 42, 20, 0.18);
}

body {
  margin: 0;
  height: 100vh;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: var(--paper);
}

/* background logo */
.bg {
  position: absolute;
  inset: 0;
  background: url("logo.jpeg") no-repeat center;
  background-size: min(58vw, 560px);
  opacity: 1;
  z-index: 0;
  bottom: 140px;
  animation: logoIntro 0.9s ease both;
}

/* overlay gradient */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(251,251,247,0.92),
    rgba(114,195,26,0.08)
  );
  z-index: 1;
}

/* container */
.content {
  position: relative;
  z-index: 2;
  text-align: center;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  padding-bottom: 12vh;
  animation: contentIntro 0.8s ease 0.25s both;
}


/* bouton start */
.start-btn {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  border: none;
  background: var(--green);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: var(--shadow), 0 18px 38px rgba(114,195,26,0.25);
  transition: 0.3s ease;
  margin: 0 auto;
  position: static;
  text-decoration: none;
}

/* hover */
.start-btn:hover {
  transform: scale(1.1);
  background: var(--green-dark);
}

.start-btn:focus-visible {
  outline: 4px solid rgba(114,195,26,0.28);
  outline-offset: 6px;
}

/* icône */
.start-btn span {
  font-size: 30px;
  color: var(--white);
}

/* animation douce */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

@keyframes logoIntro {
  from { opacity: 0; transform: scale(0.96); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes contentIntro {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.start-btn {
  animation: float 2.5s infinite ease-in-out;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">

  <a href="index.html" class="start-btn" aria-label="Commencez à pédalez">
    <span aria-hidden="true">▶</span>
  </a>

</div>

</body>
</html>
